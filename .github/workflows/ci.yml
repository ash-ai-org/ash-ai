name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install openapi-python-client==0.28.2 ruff==0.11.13
          pip install -e packages/sdk-python[dev]

      - name: Verify generated SDK is up-to-date
        run: |
          cd packages/sdk-python
          bash generate.sh
          git diff --exit-code ash_sdk/ || (echo "ERROR: Generated SDK is out of date. Run 'bash generate.sh' and commit." && exit 1)

      - name: Run tests
        run: pytest packages/sdk-python/tests/ -v
